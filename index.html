<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Check List</title>
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<meta name="apple-mobile-web-app-title" content="Check List">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: #17181A;
    color: #F2F1EC;
    min-height: 100vh;
    padding: 24px 16px 40px;
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  .top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 22px; gap: 12px; }
  .date { font-size: 12px; color: #9A9890; font-variant-numeric: tabular-nums; }
  .title { font-size: 24px; font-weight: 700; margin-top: 3px; letter-spacing: -0.5px; }
  .undo-btn {
    display: flex; align-items: center; gap: 6px;
    background: #222325; border: 1px solid #343537; border-radius: 10px;
    color: #C9C7BF; font-size: 13px; font-family: inherit;
    padding: 8px 12px; cursor: pointer; flex-shrink: 0;
  }
  .undo-btn svg { width: 16px; height: 16px; }
  .undo-btn:disabled { opacity: 0.35; cursor: default; }
  .undo-btn:not(:disabled):active { background: #2A2B2D; }
  .item {
    display: flex; align-items: center; gap: 10px;
    padding: 13px 4px; border-bottom: 1px solid #2A2B2D;
  }
  .item.editing { align-items: flex-start; }
  .item.dragging { opacity: 0.35; }
  .item.drag-over-top { box-shadow: inset 0 2px 0 0 #E8734A; }
  .item.drag-over-bottom { box-shadow: inset 0 -2px 0 0 #E8734A; }
  .drag-handle {
    width: 20px; height: 24px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: #4E4D49; cursor: grab; touch-action: none;
  }
  .drag-handle svg { width: 16px; height: 16px; }
  .drag-handle:active { cursor: grabbing; color: #8B8981; }
  .checkbox {
    width: 24px; height: 24px; flex-shrink: 0;
    border: 1.5px solid #5A5850; border-radius: 7px;
    cursor: pointer;
  }
  .checkbox:active { background: #2A2B2D; }
  .item-main { flex: 1; min-width: 0; }
  .item-text {
    font-size: 15px; line-height: 1.4;
    color: #F2F1EC; word-break: break-all; white-space: pre-wrap;
  }
  .due-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11.5px; color: #7FA88F; margin-top: 3px;
    font-variant-numeric: tabular-nums;
  }
  .due-badge.overdue { color: #E8734A; }
  .due-badge svg { width: 12px; height: 12px; flex-shrink: 0; }
  .edit-input {
    flex: 1; padding: 8px 12px;
    background: #222325; border: 1px solid #E8734A; border-radius: 9px;
    color: #F2F1EC; font-size: 15px; font-family: inherit; outline: none;
    resize: none; line-height: 1.4; min-height: 38px; overflow: hidden;
  }
  .icon-btn {
    width: 32px; height: 32px; flex-shrink: 0;
    background: none; border: none; padding: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border-radius: 8px;
  }
  .icon-btn svg { width: 18px; height: 18px; }
  .icon-btn.edit { color: #8B8981; }
  .icon-btn.del { color: #8B8981; }
  .icon-btn.del:active { color: #E8734A; background: #222325; }
  .icon-btn.restore { color: #8B8981; }
  .icon-btn.restore:active { color: #E8E6DF; background: #222325; }
  .icon-btn.edit:active { background: #222325; }
  .icon-btn.save { color: #E8734A; }
  .icon-btn.cancel { color: #8B8981; }
  .icon-btn.due { color: #8B8981; }
  .icon-btn.due.set { color: #7FA88F; }
  .icon-btn.due.overdue { color: #E8734A; }
  .icon-btn.due:active { background: #222325; }
  .due-form { display: flex; flex-direction: column; gap: 10px; }
  .due-form-row { display: flex; gap: 8px; }
  .due-form input[type="date"], .due-form input[type="time"],
  .rt-form input[type="date"], .rt-form input[type="number"], .rt-form select, .rt-form textarea {
    background: #17181A; border: 1px solid #343537; border-radius: 9px;
    color: #F2F1EC; font-size: 14px; font-family: inherit; outline: none;
    color-scheme: dark;
  }
  .due-form input[type="date"], .due-form input[type="time"] { flex: 1; height: 40px; padding: 0 10px; }
  .due-form-btns { display: flex; gap: 8px; }
  .due-form-btns button, .rt-form-btns button {
    flex: 1; height: 38px; border-radius: 9px; border: none;
    font-size: 13px; font-family: inherit; cursor: pointer; font-weight: 600;
  }
  .due-save { background: #E8734A; color: #17181A; }
  .due-clear { background: #343537; color: #C9C7BF; }
  .due-cancel { background: none; color: #8B8981; }
  .add-row { display: flex; gap: 8px; margin-top: 18px; align-items: flex-end; }
  .add-input {
    flex: 1; padding: 12px 14px;
    background: #222325; border: 1px solid #343537; border-radius: 11px;
    color: #F2F1EC; font-size: 15px; font-family: inherit; outline: none;
    resize: none; line-height: 1.4; min-height: 46px; overflow: hidden;
  }
  .add-input::placeholder { color: #6E6C64; }
  .add-due-toggle {
    width: 46px; height: 46px; flex-shrink: 0;
    background: #222325; border: 1px solid #343537; border-radius: 11px;
    color: #8B8981; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .add-due-toggle svg { width: 20px; height: 20px; }
  .add-due-toggle.on { color: #7FA88F; border-color: #4A5F52; }
  .add-btn {
    width: 46px; height: 46px; flex-shrink: 0;
    background: #E8734A; border: none; border-radius: 11px;
    color: #17181A; font-size: 24px; font-weight: 600; cursor: pointer;
  }
  .add-btn:active { background: #d1633d; }
  .add-due-form {
    display: none; margin-top: 10px; padding: 12px;
    background: #1D1E20; border: 1px solid #2A2B2D; border-radius: 11px;
  }
  .add-due-form.show { display: block; }
  .empty { text-align: center; color: #6E6C64; font-size: 14px; padding: 30px 0; }
  .status { font-size: 12px; margin-top: 10px; min-height: 14px; }
  .status.sync { color: #6E6C64; }
  .status.err { color: #E8734A; }
  .sec-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 26px; padding-top: 16px; border-top: 1px solid #2A2B2D;
  }
  .sec-title {
    display: flex; align-items: center; gap: 7px;
    font-size: 14px; color: #C9C7BF; cursor: pointer;
    background: none; border: none; font-family: inherit; padding: 4px 0;
  }
  .sec-title .chev { width: 15px; height: 15px; transition: transform .2s; color: #8B8981; }
  .sec-title .chev.collapsed { transform: rotate(-90deg); }
  .sec-count { color: #6E6C64; }
  .sec-action {
    background: none; border: none; color: #8B8981;
    font-size: 13px; font-family: inherit; cursor: pointer; padding: 4px 6px;
  }
  .sec-action:active { color: #E8734A; }
  .rt-item { display: flex; align-items: center; gap: 10px; padding: 12px 4px; border-bottom: 1px solid #232427; }
  .rt-main { flex: 1; min-width: 0; }
  .rt-text { font-size: 15px; line-height: 1.4; color: #F2F1EC; word-break: break-all; white-space: pre-wrap; }
  .rt-meta {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11.5px; color: #9A9890; margin-top: 3px;
    font-variant-numeric: tabular-nums;
  }
  .rt-meta.overdue { color: #E8734A; }
  .rt-meta svg { width: 12px; height: 12px; flex-shrink: 0; }
  .rt-form {
    padding: 12px; margin: 8px 0;
    background: #1D1E20; border: 1px solid #2A2B2D; border-radius: 11px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .rt-form textarea {
    width: 100%; padding: 10px 12px; resize: none; line-height: 1.4;
    min-height: 42px; overflow: hidden; font-size: 15px;
  }
  .rt-form-row { display: flex; gap: 8px; align-items: center; }
  .rt-form input[type="number"] { width: 70px; height: 40px; padding: 0 10px; text-align: center; }
  .rt-form select { flex: 1; height: 40px; padding: 0 10px; }
  .rt-form input[type="date"] { flex: 1.4; height: 40px; padding: 0 10px; }
  .rt-form-label { font-size: 12px; color: #8B8981; }
  .rt-form-btns { display: flex; gap: 8px; }
  .comp-item { display: flex; align-items: center; gap: 10px; padding: 10px 4px; }
  .comp-check { width: 19px; height: 19px; color: #6E7A70; flex-shrink: 0; }
  .comp-text { flex: 1; font-size: 14px; color: #8B8981; text-decoration: line-through; word-break: break-all; line-height: 1.4; white-space: pre-wrap; }
  .comp-time { font-size: 11px; color: #5F5E5A; flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .made-by {
    text-align: center; font-size: 11px; color: #4E4D49;
    margin-top: 34px; letter-spacing: 0.8px;
  }
  .banner {
    background: #3A1E18; border: 1px solid #6E3A2A; border-radius: 10px;
    padding: 14px; margin-bottom: 20px; font-size: 13px; line-height: 1.6;
    color: #F0C4B4; display: none;
  }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center;
    padding: 24px; z-index: 100;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #212225; border: 1px solid #343537; border-radius: 16px;
    padding: 24px 22px 18px; width: 100%; max-width: 340px;
  }
  .modal-q { font-size: 16px; font-weight: 600; margin: 0 0 6px; }
  .modal-item { font-size: 14px; color: #9A9890; margin: 0 0 22px; word-break: break-all; line-height: 1.5; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button {
    flex: 1; height: 46px; border: none; border-radius: 11px;
    font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer;
  }
  .btn-cancel { background: #343537; color: #E8E6DF; }
  .btn-cancel:active { background: #3E3F41; }
  .btn-confirm { background: #E8734A; color: #17181A; }
  .btn-confirm:active { background: #d1633d; }
</style>
</head>
<body>
<div class="wrap">
  <div class="banner" id="config-banner">
    Firebase 설정이 아직 안 됐어. 아래 <b>&lt;script&gt;</b> 안의 <b>firebaseConfig</b> 값을 네 프로젝트 걸로 채워야 동기화가 작동해.
  </div>

  <div class="top">
    <div>
      <div class="date" id="date-label"></div>
      <div class="title">Check List</div>
    </div>
    <button class="undo-btn" id="undo-btn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"/></svg>
      되돌리기
    </button>
  </div>

  <div id="list"></div>

  <div class="add-row">
    <textarea class="add-input" id="new-input" rows="1" placeholder="항목 추가"></textarea>
    <button class="add-due-toggle" id="add-due-toggle" aria-label="일정 추가">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14"/></svg>
    </button>
    <button class="add-btn" id="add-btn">+</button>
  </div>

  <div class="add-due-form" id="add-due-form">
    <div class="due-form">
      <div class="due-form-row">
        <input type="date" id="add-date">
        <input type="time" id="add-time" value="09:00">
      </div>
    </div>
  </div>

  <div class="status sync" id="status"></div>

  <div id="routine-section"></div>

  <div id="completed-section"></div>

  <div class="made-by">made by x3phyr</div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <p class="modal-q" id="modal-q"></p>
    <p class="modal-item" id="modal-item"></p>
    <div class="modal-btns">
      <button class="btn-cancel" id="modal-cancel">취소</button>
      <button class="btn-confirm" id="modal-confirm">삭제</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { initializeFirestore, getFirestore, persistentLocalCache, persistentMultipleTabManager, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA2aUEijSBivYAdZbaXGnnO9rg6d8g-Pvg",
  authDomain: "check-91de6.firebaseapp.com",
  projectId: "check-91de6",
  storageBucket: "check-91de6.firebasestorage.app",
  messagingSenderId: "400856324106",
  appId: "1:400856324106:web:ada30a3ebec293a4ae67f3"
};

const DEFAULT_ITEMS = [
  {id:'d1', text:'오늘 할 일 정하기'},
  {id:'d2', text:'운동 30분'},
  {id:'d3', text:'스킨케어 루틴'}
];

const $ = id => document.getElementById(id);
const isTouch = window.matchMedia('(pointer: coarse)').matches
  || ('ontouchstart' in window)
  || (navigator.maxTouchPoints && navigator.maxTouchPoints > 0);

const LOCAL_KEY = 'checklist_last_state_v1';

function loadLocalSnapshot(){
  try {
    const raw = localStorage.getItem(LOCAL_KEY);
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    if(!parsed || !Array.isArray(parsed.items)) return null;
    if(!Array.isArray(parsed.completed)) parsed.completed = [];
    if(!Array.isArray(parsed.routines)) parsed.routines = [];
    return parsed;
  } catch(e){ return null; }
}

function saveLocalSnapshot(s){
  try { localStorage.setItem(LOCAL_KEY, JSON.stringify(s)); } catch(e){}
}

let state = { items: [], completed: [], routines: [] };
let editingId = null;
let dueEditId = null;
let routineForm = null;   // 'new' 또는 routine id
let undoStack = [];
let showCompleted = true;
let showRoutines = true;
let modalAction = null;
let loaded = false;

const ICON_EDIT = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>';
const ICON_X = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
const ICON_SAVE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
const ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
const ICON_CHEV = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
const ICON_RESTORE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>';
const ICON_DRAG = '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.6"/><circle cx="15" cy="6" r="1.6"/><circle cx="9" cy="12" r="1.6"/><circle cx="15" cy="12" r="1.6"/><circle cx="9" cy="18" r="1.6"/><circle cx="15" cy="18" r="1.6"/></svg>';
const ICON_CLOCK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14"/></svg>';
const ICON_REPEAT = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>';

const DAYS = ['일','월','화','수','목','금','토'];
const UNIT_LABEL = { day: '일', week: '주', month: '개월' };

function pad(n){ return String(n).padStart(2,'0'); }

function updateClock(){
  const n = new Date();
  $('date-label').textContent =
    `${n.getFullYear()}년 ${n.getMonth()+1}월 ${n.getDate()}일 (${DAYS[n.getDay()]}) ${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
}
setInterval(updateClock, 1000);
setInterval(() => { if(!editingId && !dueEditId && !routineForm) render(); }, 60000);
updateClock();

function fmtTime(ts){
  const n = new Date(ts);
  return `${n.getMonth()+1}/${n.getDate()} ${pad(n.getHours())}:${pad(n.getMinutes())}`;
}

function fmtDue(ts){
  const n = new Date(ts);
  const now = new Date();
  const y = n.getFullYear() === now.getFullYear() ? '' : (n.getFullYear() + '.');
  return `${y}${n.getMonth()+1}.${n.getDate()} ${pad(n.getHours())}:${pad(n.getMinutes())}`;
}

function fmtDateOnly(ts){
  const n = new Date(ts);
  const now = new Date();
  const y = n.getFullYear() === now.getFullYear() ? '' : (n.getFullYear() + '.');
  return `${y}${n.getMonth()+1}.${n.getDate()}`;
}

function todayStart(){
  const n = new Date();
  return new Date(n.getFullYear(), n.getMonth(), n.getDate()).getTime();
}

function addInterval(baseTs, n, unit){
  const d = new Date(baseTs);
  if(unit === 'day') d.setDate(d.getDate() + n);
  else if(unit === 'week') d.setDate(d.getDate() + n*7);
  else d.setMonth(d.getMonth() + n);
  return d.getTime();
}

function dateInputValue(ts){
  const d = new Date(ts);
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}

function setStatus(text, isErr){
  const el = $('status');
  el.textContent = text;
  el.className = 'status ' + (isErr ? 'err' : 'sync');
}

function autoResize(ta){
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

if(!firebaseConfig.apiKey || !firebaseConfig.projectId){
  $('config-banner').style.display = 'block';
  renderLocal();
} else {
  const snapshot = loadLocalSnapshot();
  if(snapshot){
    state = snapshot;
    setStatus('불러온 기록 표시 중…');
    render();
  }
  startFirebase();
}

function startFirebase(){
  let app, db, auth, docRef;
  try {
    app = initializeApp(firebaseConfig);
    try {
      db = initializeFirestore(app, {
        localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
      });
    } catch(cacheErr){
      db = getFirestore(app);
    }
    auth = getAuth(app);
    docRef = doc(db, "checklist", "main");
  } catch(e){
    setStatus('Firebase 초기화 실패: ' + e.message, true);
    renderLocal();
    return;
  }

  setStatus('연결 중…');

  onAuthStateChanged(auth, user => {
    if(!user) return;

    onSnapshot(docRef, snap => {
      if(!snap.exists()){
        if(!snap.metadata.fromCache){
          setDoc(docRef, { items: DEFAULT_ITEMS, completed: [], routines: [] });
        }
        return;
      }
      const data = snap.data();
      state = {
        items: (data.items || []).map(i => { const o = { id: i.id, text: i.text }; if(i.due) o.due = i.due; return o; }),
        completed: (data.completed || []).map(c => { const o = { id: c.id, text: c.text, doneAt: c.doneAt }; if(c.due) o.due = c.due; if(c.routine) o.routine = true; return o; }),
        routines: (data.routines || []).map(r => ({ id: r.id, text: r.text, intervalN: r.intervalN, intervalUnit: r.intervalUnit, nextDue: r.nextDue }))
      };
      loaded = true;
      saveLocalSnapshot(state);
      setStatus(snap.metadata.fromCache ? '캐시에서 불러옴' : '동기화됨');
      if(!editingId && !dueEditId && !routineForm) render();
    }, err => {
      setStatus('동기화 오류: ' + err.message, true);
    });
  });

  signInAnonymously(auth).catch(e => {
    setStatus('로그인 실패: ' + e.message + ' (익명 인증을 켰는지 확인)', true);
  });

  window.__save = async () => {
    if(!loaded) return;
    try {
      await setDoc(docRef, { items: state.items, completed: state.completed, routines: state.routines });
    } catch(e){
      setStatus('저장 실패: ' + e.message, true);
    }
  };
}

function renderLocal(){
  state = { items: DEFAULT_ITEMS.map(i => ({...i})), completed: [], routines: [] };
  loaded = true;
  window.__save = async () => {};
  render();
}

function mutate(fn){
  if(!loaded) return;
  undoStack.push(JSON.stringify(state));
  if(undoStack.length > 50) undoStack.shift();
  fn();
  saveLocalSnapshot(state);
  window.__save();
  render();
}

function undo(){
  if(!undoStack.length) return;
  state = JSON.parse(undoStack.pop());
  editingId = null;
  dueEditId = null;
  routineForm = null;
  saveLocalSnapshot(state);
  window.__save();
  render();
}

function render(){
  renderList();
  renderRoutines();
  renderCompleted();
  $('undo-btn').disabled = undoStack.length === 0;
}

/* ============ 진행 목록 ============ */

function renderList(){
  const root = $('list');
  root.innerHTML = '';

  if(state.items.length === 0){
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = '항목이 없어. 아래에서 추가해봐.';
    root.appendChild(empty);
    return;
  }

  state.items.forEach(item => {
    const row = document.createElement('div');
    row.className = 'item';

    if(editingId === item.id){
      row.classList.add('editing');
      const input = document.createElement('textarea');
      input.className = 'edit-input';
      input.rows = 1;
      input.value = item.text;

      const commit = () => {
        const v = input.value.trim();
        if(v && v !== item.text){
          mutate(() => { item.text = v; editingId = null; });
        } else {
          editingId = null; render();
        }
      };
      const cancel = () => { editingId = null; render(); };
      input.onkeydown = e => {
        if(e.key === 'Enter' && !e.shiftKey && !isTouch){ e.preventDefault(); commit(); }
        if(e.key === 'Escape') cancel();
      };
      input.oninput = () => autoResize(input);
      row.appendChild(input);

      const saveBtn = document.createElement('button');
      saveBtn.className = 'icon-btn save';
      saveBtn.innerHTML = ICON_SAVE;
      saveBtn.setAttribute('aria-label', '저장');
      saveBtn.onclick = commit;
      row.appendChild(saveBtn);

      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'icon-btn cancel';
      cancelBtn.innerHTML = ICON_X;
      cancelBtn.setAttribute('aria-label', '취소');
      cancelBtn.onclick = cancel;
      row.appendChild(cancelBtn);

      root.appendChild(row);
      setTimeout(() => { input.focus(); autoResize(input); input.setSelectionRange(input.value.length, input.value.length); }, 0);
    } else {
      row.dataset.itemId = item.id;

      const handle = document.createElement('div');
      handle.className = 'drag-handle';
      handle.innerHTML = ICON_DRAG;
      handle.setAttribute('aria-label', '순서 변경');
      row.appendChild(handle);

      const cb = document.createElement('div');
      cb.className = 'checkbox';
      cb.setAttribute('role', 'button');
      cb.setAttribute('aria-label', '완료');
      cb.onclick = () => completeItem(item.id);
      row.appendChild(cb);

      const text = document.createElement('span');
      text.className = 'item-text';
      text.textContent = item.text;

      const main = document.createElement('div');
      main.className = 'item-main';
      main.appendChild(text);

      if(item.due){
        const overdue = item.due < Date.now();
        const badge = document.createElement('div');
        badge.className = 'due-badge' + (overdue ? ' overdue' : '');
        badge.innerHTML = ICON_CLOCK + '<span>' + fmtDue(item.due) + '</span>';
        main.appendChild(badge);
      }
      row.appendChild(main);

      const dueBtn = document.createElement('button');
      const overdueNow = item.due && item.due < Date.now();
      dueBtn.className = 'icon-btn due' + (item.due ? (overdueNow ? ' overdue' : ' set') : '');
      dueBtn.innerHTML = ICON_CLOCK;
      dueBtn.setAttribute('aria-label', '일정 지정');
      dueBtn.onclick = () => { dueEditId = (dueEditId === item.id ? null : item.id); render(); };
      row.appendChild(dueBtn);

      const editBtn = document.createElement('button');
      editBtn.className = 'icon-btn edit';
      editBtn.innerHTML = ICON_EDIT;
      editBtn.setAttribute('aria-label', '수정');
      editBtn.onclick = () => { editingId = item.id; render(); };
      row.appendChild(editBtn);

      const delBtn = document.createElement('button');
      delBtn.className = 'icon-btn del';
      delBtn.innerHTML = ICON_X;
      delBtn.setAttribute('aria-label', '삭제');
      delBtn.onclick = () => mutate(() => {
        state.items = state.items.filter(i => i.id !== item.id);
      });
      row.appendChild(delBtn);

      root.appendChild(row);
      initDrag(handle, row);

      if(dueEditId === item.id){
        root.appendChild(buildDueForm(item));
      }
    }
  });
}

function buildDueForm(item){
  const wrap = document.createElement('div');
  wrap.className = 'due-form';
  wrap.style.padding = '4px 4px 14px 54px';
  wrap.style.borderBottom = '1px solid #2A2B2D';

  const row1 = document.createElement('div');
  row1.className = 'due-form-row';

  const dateInput = document.createElement('input');
  dateInput.type = 'date';
  const timeInput = document.createElement('input');
  timeInput.type = 'time';

  if(item.due){
    const d = new Date(item.due);
    dateInput.value = dateInputValue(item.due);
    timeInput.value = pad(d.getHours()) + ':' + pad(d.getMinutes());
  } else {
    dateInput.value = dateInputValue(Date.now());
    timeInput.value = '09:00';
  }

  row1.appendChild(dateInput);
  row1.appendChild(timeInput);
  wrap.appendChild(row1);

  const btnRow = document.createElement('div');
  btnRow.className = 'due-form-btns';

  const saveBtn = document.createElement('button');
  saveBtn.className = 'due-save';
  saveBtn.textContent = '저장';
  saveBtn.onclick = () => {
    if(!dateInput.value) return;
    const ts = new Date(dateInput.value + 'T' + (timeInput.value || '00:00')).getTime();
    mutate(() => { item.due = ts; });
    dueEditId = null;
    render();
  };

  const clearBtn = document.createElement('button');
  clearBtn.className = 'due-clear';
  clearBtn.textContent = '일정 없음';
  clearBtn.onclick = () => {
    mutate(() => { delete item.due; });
    dueEditId = null;
    render();
  };

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'due-cancel';
  cancelBtn.textContent = '취소';
  cancelBtn.onclick = () => { dueEditId = null; render(); };

  btnRow.appendChild(saveBtn);
  btnRow.appendChild(clearBtn);
  btnRow.appendChild(cancelBtn);
  wrap.appendChild(btnRow);

  return wrap;
}

/* ============ 드래그 정렬 ============ */

function initDrag(handle, row){
  let dragging = false;
  let rows = [];

  handle.addEventListener('pointerdown', e => {
    e.preventDefault();
    dragging = true;
    rows = Array.from($('list').querySelectorAll('.item[data-item-id]'));
    row.classList.add('dragging');
    handle.setPointerCapture(e.pointerId);

    const onMove = ev => {
      if(!dragging) return;
      const y = ev.clientY;
      rows.forEach(r => {
        if(r === row) return;
        r.classList.remove('drag-over-top', 'drag-over-bottom');
        const rect = r.getBoundingClientRect();
        if(y > rect.top && y < rect.bottom){
          if(y < rect.top + rect.height/2) r.classList.add('drag-over-top');
          else r.classList.add('drag-over-bottom');
        }
      });
    };

    const onUp = ev => {
      dragging = false;
      handle.releasePointerCapture(ev.pointerId);
      row.classList.remove('dragging');

      let targetId = null, before = true;
      for(const r of rows){
        if(r.classList.contains('drag-over-top')){ targetId = r.dataset.itemId; before = true; }
        if(r.classList.contains('drag-over-bottom')){ targetId = r.dataset.itemId; before = false; }
        r.classList.remove('drag-over-top', 'drag-over-bottom');
      }

      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);

      if(!targetId || targetId === row.dataset.itemId) return;
      reorder(row.dataset.itemId, targetId, before);
    };

    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  });
}

function reorder(draggedId, targetId, before){
  mutate(() => {
    const fromIdx = state.items.findIndex(i => i.id === draggedId);
    if(fromIdx === -1) return;
    const [moved] = state.items.splice(fromIdx, 1);
    let toIdx = state.items.findIndex(i => i.id === targetId);
    if(toIdx === -1){ state.items.splice(fromIdx, 0, moved); return; }
    if(!before) toIdx += 1;
    state.items.splice(toIdx, 0, moved);
  });
}

/* ============ 완료 처리 ============ */

function completeItem(id){
  const item = state.items.find(i => i.id === id);
  if(!item) return;
  mutate(() => {
    state.items = state.items.filter(i => i.id !== id);
    const rec = { id: item.id, text: item.text, doneAt: Date.now() };
    if(item.due) rec.due = item.due;
    state.completed.push(rec);
  });
}

function restoreItem(id){
  const c = state.completed.find(x => x.id === id);
  if(!c) return;
  mutate(() => {
    state.completed = state.completed.filter(x => x.id !== id);
    const item = { id: c.id, text: c.text };
    if(c.due) item.due = c.due;
    state.items.push(item);
  });
}

/* ============ 반복 작업 ============ */

function completeRoutine(id){
  const r = state.routines.find(x => x.id === id);
  if(!r) return;
  mutate(() => {
    state.completed.push({ id: 'rc_' + Date.now(), text: r.text, doneAt: Date.now(), routine: true });
    r.nextDue = addInterval(todayStart(), r.intervalN, r.intervalUnit);
  });
}

function renderRoutines(){
  const sec = $('routine-section');
  sec.innerHTML = '';

  const header = document.createElement('div');
  header.className = 'sec-header';

  const titleBtn = document.createElement('button');
  titleBtn.className = 'sec-title';
  titleBtn.innerHTML =
    '<span class="chev' + (showRoutines ? '' : ' collapsed') + '">' + ICON_CHEV + '</span>' +
    '반복 작업 <span class="sec-count">' + state.routines.length + '</span>';
  titleBtn.onclick = () => { showRoutines = !showRoutines; render(); };
  header.appendChild(titleBtn);

  const addBtn = document.createElement('button');
  addBtn.className = 'sec-action';
  addBtn.textContent = '+ 추가';
  addBtn.onclick = () => { routineForm = 'new'; showRoutines = true; render(); };
  header.appendChild(addBtn);

  sec.appendChild(header);

  if(!showRoutines) return;

  if(routineForm === 'new'){
    sec.appendChild(buildRoutineForm(null));
  }

  if(state.routines.length === 0 && routineForm !== 'new'){
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.style.padding = '18px 0';
    empty.textContent = '몇 주 · 몇 개월 주기로 반복되는 일을 등록해봐.';
    sec.appendChild(empty);
    return;
  }

  const sorted = [...state.routines].sort((a,b) => a.nextDue - b.nextDue);
  sorted.forEach(r => {
    if(routineForm === r.id){
      sec.appendChild(buildRoutineForm(r));
      return;
    }

    const row = document.createElement('div');
    row.className = 'rt-item';

    const cb = document.createElement('div');
    cb.className = 'checkbox';
    cb.setAttribute('role', 'button');
    cb.setAttribute('aria-label', '완료 (다음 주기로)');
    cb.onclick = () => completeRoutine(r.id);
    row.appendChild(cb);

    const main = document.createElement('div');
    main.className = 'rt-main';

    const text = document.createElement('div');
    text.className = 'rt-text';
    text.textContent = r.text;
    main.appendChild(text);

    const dayDiff = Math.round((r.nextDue - todayStart()) / 86400000);
    const overdue = dayDiff <= 0;
    let dText;
    if(dayDiff > 0) dText = 'D-' + dayDiff;
    else if(dayDiff === 0) dText = '오늘';
    else dText = (-dayDiff) + '일 지남';

    const meta = document.createElement('div');
    meta.className = 'rt-meta' + (overdue ? ' overdue' : '');
    meta.innerHTML = ICON_REPEAT + '<span>' + r.intervalN + UNIT_LABEL[r.intervalUnit] + '마다 · ' + fmtDateOnly(r.nextDue) + ' (' + dText + ')</span>';
    main.appendChild(meta);

    row.appendChild(main);

    const editBtn = document.createElement('button');
    editBtn.className = 'icon-btn edit';
    editBtn.innerHTML = ICON_EDIT;
    editBtn.setAttribute('aria-label', '수정');
    editBtn.onclick = () => { routineForm = r.id; render(); };
    row.appendChild(editBtn);

    const delBtn = document.createElement('button');
    delBtn.className = 'icon-btn del';
    delBtn.innerHTML = ICON_X;
    delBtn.setAttribute('aria-label', '삭제');
    delBtn.onclick = () => mutate(() => {
      state.routines = state.routines.filter(x => x.id !== r.id);
    });
    row.appendChild(delBtn);

    sec.appendChild(row);
  });
}

function buildRoutineForm(routine){
  const wrap = document.createElement('div');
  wrap.className = 'rt-form';

  const textInput = document.createElement('textarea');
  textInput.rows = 1;
  textInput.placeholder = '반복할 일 (예: 로봇청소기 통비우기)';
  if(routine) textInput.value = routine.text;
  textInput.oninput = () => autoResize(textInput);
  wrap.appendChild(textInput);

  const row1 = document.createElement('div');
  row1.className = 'rt-form-row';

  const label1 = document.createElement('span');
  label1.className = 'rt-form-label';
  label1.textContent = '주기';
  row1.appendChild(label1);

  const nInput = document.createElement('input');
  nInput.type = 'number';
  nInput.min = '1';
  nInput.value = routine ? routine.intervalN : 1;
  row1.appendChild(nInput);

  const unitSel = document.createElement('select');
  [['day','일'],['week','주'],['month','개월']].forEach(([v,l]) => {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = l;
    unitSel.appendChild(opt);
  });
  unitSel.value = routine ? routine.intervalUnit : 'month';
  row1.appendChild(unitSel);
  wrap.appendChild(row1);

  const row2 = document.createElement('div');
  row2.className = 'rt-form-row';

  const label2 = document.createElement('span');
  label2.className = 'rt-form-label';
  label2.textContent = '다음 예정일';
  row2.appendChild(label2);

  const dateInput = document.createElement('input');
  dateInput.type = 'date';
  let dateTouched = !!routine;

  const calcDefault = () => {
    const n = parseInt(nInput.value, 10) || 1;
    return dateInputValue(addInterval(todayStart(), n, unitSel.value));
  };
  dateInput.value = routine ? dateInputValue(routine.nextDue) : calcDefault();
  dateInput.onchange = () => { dateTouched = true; };
  nInput.oninput = () => { if(!dateTouched) dateInput.value = calcDefault(); };
  unitSel.onchange = () => { if(!dateTouched) dateInput.value = calcDefault(); };

  row2.appendChild(dateInput);
  wrap.appendChild(row2);

  const btnRow = document.createElement('div');
  btnRow.className = 'rt-form-btns';

  const saveBtn = document.createElement('button');
  saveBtn.className = 'due-save';
  saveBtn.textContent = routine ? '저장' : '추가';
  saveBtn.onclick = () => {
    const text = textInput.value.trim();
    const n = parseInt(nInput.value, 10);
    if(!text || !n || n < 1 || !dateInput.value) return;
    const nextDue = new Date(dateInput.value + 'T00:00').getTime();
    if(routine){
      mutate(() => {
        routine.text = text;
        routine.intervalN = n;
        routine.intervalUnit = unitSel.value;
        routine.nextDue = nextDue;
      });
    } else {
      mutate(() => {
        state.routines.push({ id: 'rt_' + Date.now(), text, intervalN: n, intervalUnit: unitSel.value, nextDue });
      });
    }
    routineForm = null;
    render();
  };

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'due-cancel';
  cancelBtn.textContent = '취소';
  cancelBtn.onclick = () => { routineForm = null; render(); };

  btnRow.appendChild(saveBtn);
  btnRow.appendChild(cancelBtn);
  wrap.appendChild(btnRow);

  setTimeout(() => { if(!routine) textInput.focus(); autoResize(textInput); }, 0);

  return wrap;
}

/* ============ 완료 기록 ============ */

function renderCompleted(){
  const sec = $('completed-section');
  sec.innerHTML = '';
  if(state.completed.length === 0) return;

  const header = document.createElement('div');
  header.className = 'sec-header';

  const titleBtn = document.createElement('button');
  titleBtn.className = 'sec-title';
  titleBtn.innerHTML =
    '<span class="chev' + (showCompleted ? '' : ' collapsed') + '">' + ICON_CHEV + '</span>' +
    '완료 기록 <span class="sec-count">' + state.completed.length + '</span>';
  titleBtn.onclick = () => { showCompleted = !showCompleted; render(); };
  header.appendChild(titleBtn);

  const clearBtn = document.createElement('button');
  clearBtn.className = 'sec-action';
  clearBtn.textContent = '모두 지우기';
  clearBtn.onclick = openClearModal;
  header.appendChild(clearBtn);

  sec.appendChild(header);

  if(!showCompleted) return;

  const sorted = [...state.completed].sort((a,b) => b.doneAt - a.doneAt);
  sorted.forEach(c => {
    const row = document.createElement('div');
    row.className = 'comp-item';

    const chk = document.createElement('span');
    chk.className = 'comp-check';
    chk.innerHTML = ICON_CHECK;
    row.appendChild(chk);

    const text = document.createElement('span');
    text.className = 'comp-text';
    text.textContent = c.text;
    row.appendChild(text);

    const time = document.createElement('span');
    time.className = 'comp-time';
    time.textContent = c.doneAt ? fmtTime(c.doneAt) : '';
    row.appendChild(time);

    if(!c.routine){
      const restore = document.createElement('button');
      restore.className = 'icon-btn restore';
      restore.innerHTML = ICON_RESTORE;
      restore.setAttribute('aria-label', '복구');
      restore.onclick = () => restoreItem(c.id);
      row.appendChild(restore);
    }

    const del = document.createElement('button');
    del.className = 'icon-btn del';
    del.innerHTML = ICON_X;
    del.setAttribute('aria-label', '기록 삭제');
    del.onclick = () => mutate(() => {
      state.completed = state.completed.filter(x => x.id !== c.id);
    });
    row.appendChild(del);

    sec.appendChild(row);
  });
}

/* ============ 모달 ============ */

function openClearModal(){
  modalAction = 'clearCompleted';
  $('modal-q').textContent = '완료 기록을 모두 지울까요?';
  $('modal-item').textContent = state.completed.length + '개 기록이 삭제돼. 되돌리기로 복구할 수 있어.';
  $('modal').classList.add('show');
}

function closeModal(){ modalAction = null; $('modal').classList.remove('show'); }

$('modal-cancel').onclick = closeModal;
$('modal-confirm').onclick = () => {
  if(modalAction === 'clearCompleted'){
    mutate(() => { state.completed = []; });
  }
  closeModal();
};
$('modal').onclick = e => { if(e.target === $('modal')) closeModal(); };

$('undo-btn').onclick = undo;

/* ============ 항목 추가 ============ */

let addDueOpen = false;

$('add-due-toggle').onclick = () => {
  addDueOpen = !addDueOpen;
  $('add-due-form').classList.toggle('show', addDueOpen);
  $('add-due-toggle').classList.toggle('on', addDueOpen);
  if(addDueOpen && !$('add-date').value){
    $('add-date').value = dateInputValue(Date.now());
  }
};

function addItem(){
  const inp = $('new-input');
  const v = inp.value.trim();
  if(!v) return;
  const item = { id: 'item_' + Date.now(), text: v };
  if(addDueOpen && $('add-date').value){
    item.due = new Date($('add-date').value + 'T' + ($('add-time').value || '00:00')).getTime();
  }
  mutate(() => { state.items.push(item); });
  inp.value = '';
  autoResize(inp);
  if(addDueOpen){
    addDueOpen = false;
    $('add-due-form').classList.remove('show');
    $('add-due-toggle').classList.remove('on');
    $('add-date').value = '';
    $('add-time').value = '09:00';
  }
}
$('add-btn').onclick = addItem;
$('new-input').onkeydown = e => {
  if(e.key === 'Enter' && !e.shiftKey && !isTouch){ e.preventDefault(); addItem(); }
};
$('new-input').oninput = () => autoResize($('new-input'));
</script>
