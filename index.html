<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>체크리스트</title>
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<meta name="apple-mobile-web-app-title" content="체크리스트">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: #17181A;
    color: #F2F1EC;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  .top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 22px; }
  .date { font-size: 13px; color: #9A9890; }
  .title { font-size: 22px; font-weight: 600; margin-top: 2px; }
  .undo-btn {
    display: flex; align-items: center; gap: 6px;
    background: #222325; border: 1px solid #343537; border-radius: 10px;
    color: #C9C7BF; font-size: 13px; font-family: inherit;
    padding: 8px 12px; cursor: pointer; flex-shrink: 0;
  }
  .undo-btn svg { width: 16px; height: 16px; }
  .undo-btn:disabled { opacity: 0.35; cursor: default; }
  .undo-btn:not(:disabled):active { background: #2A2B2D; }
  .item {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 4px; border-bottom: 1px solid #2A2B2D;
  }
  .checkbox {
    width: 24px; height: 24px; flex-shrink: 0;
    border: 1.5px solid #5A5850; border-radius: 7px;
    cursor: pointer;
  }
  .checkbox:active { background: #2A2B2D; }
  .item-text {
    flex: 1; font-size: 15px; line-height: 1.4;
    color: #F2F1EC; word-break: break-all;
  }
  .edit-input {
    flex: 1; height: 38px; padding: 0 12px;
    background: #222325; border: 1px solid #E8734A; border-radius: 9px;
    color: #F2F1EC; font-size: 15px; font-family: inherit; outline: none;
  }
  .icon-btn {
    width: 34px; height: 34px; flex-shrink: 0;
    background: none; border: none; padding: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border-radius: 8px;
  }
  .icon-btn svg { width: 19px; height: 19px; }
  .icon-btn.edit { color: #8B8981; }
  .icon-btn.edit:active { background: #222325; }
  .icon-btn.save { color: #E8734A; }
  .icon-btn.cancel { color: #8B8981; }
  .add-row { display: flex; gap: 8px; margin-top: 18px; }
  .add-input {
    flex: 1; height: 46px; padding: 0 14px;
    background: #222325; border: 1px solid #343537; border-radius: 11px;
    color: #F2F1EC; font-size: 15px; font-family: inherit; outline: none;
  }
  .add-input::placeholder { color: #6E6C64; }
  .add-btn {
    width: 46px; height: 46px; flex-shrink: 0;
    background: #E8734A; border: none; border-radius: 11px;
    color: #17181A; font-size: 24px; font-weight: 600; cursor: pointer;
  }
  .add-btn:active { background: #d1633d; }
  .footer {
    margin-top: 28px; padding-top: 16px;
    border-top: 1px solid #2A2B2D;
    font-size: 12px; color: #6E6C64; line-height: 1.6;
  }
  .empty { text-align: center; color: #6E6C64; font-size: 14px; padding: 34px 0; }
  .status { font-size: 12px; margin-top: 10px; min-height: 16px; }
  .status.sync { color: #6E6C64; }
  .status.err { color: #E8734A; }
  .banner {
    background: #3A1E18; border: 1px solid #6E3A2A; border-radius: 10px;
    padding: 14px; margin-bottom: 20px; font-size: 13px; line-height: 1.6;
    color: #F0C4B4; display: none;
  }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center;
    padding: 24px; z-index: 100;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #212225; border: 1px solid #343537; border-radius: 16px;
    padding: 24px 22px 18px; width: 100%; max-width: 340px;
  }
  .modal-q { font-size: 16px; font-weight: 600; margin: 0 0 6px; }
  .modal-item {
    font-size: 14px; color: #9A9890; margin: 0 0 22px;
    word-break: break-all; line-height: 1.5;
  }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button {
    flex: 1; height: 46px; border: none; border-radius: 11px;
    font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer;
  }
  .btn-cancel { background: #343537; color: #E8E6DF; }
  .btn-cancel:active { background: #3E3F41; }
  .btn-confirm { background: #E8734A; color: #17181A; }
  .btn-confirm:active { background: #d1633d; }
</style>
</head>
<body>
<div class="wrap">
  <div class="banner" id="config-banner">
    Firebase 설정이 아직 안 됐어. 아래 <b>&lt;script&gt;</b> 안의 <b>firebaseConfig</b> 값을 네 프로젝트 걸로 채워야 동기화가 작동해.
  </div>

  <div class="top">
    <div>
      <div class="date" id="date-label"></div>
      <div class="title">오늘의 체크리스트</div>
    </div>
    <button class="undo-btn" id="undo-btn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"/></svg>
      되돌리기
    </button>
  </div>

  <div id="list"></div>

  <div class="add-row">
    <input type="text" class="add-input" id="new-input" placeholder="항목 추가">
    <button class="add-btn" id="add-btn">+</button>
  </div>

  <div class="status sync" id="status"></div>

  <div class="footer">
    체크박스를 누르면 완료된 항목을 삭제할지 물어봐. 연필 버튼으로 내용을 수정할 수 있고, 실수했으면 되돌리기 버튼으로 복구돼. 모든 기기에서 실시간으로 같이 보여.
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <p class="modal-q">이 항목을 삭제할까요?</p>
    <p class="modal-item" id="modal-item"></p>
    <div class="modal-btns">
      <button class="btn-cancel" id="modal-cancel">취소</button>
      <button class="btn-confirm" id="modal-confirm">삭제</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA2aUEijSBivYAdZbaXGnnO9rg6d8g-Pvg",
  authDomain: "check-91de6.firebaseapp.com",
  projectId: "check-91de6",
  storageBucket: "check-91de6.firebasestorage.app",
  messagingSenderId: "400856324106",
  appId: "1:400856324106:web:ada30a3ebec293a4ae67f3"
};

const DEFAULT_ITEMS = [
  {id:'d1', text:'오늘 할 일 정하기'},
  {id:'d2', text:'운동 30분'},
  {id:'d3', text:'스킨케어 루틴'}
];

const $ = id => document.getElementById(id);

$('date-label').textContent =
  new Date().toLocaleDateString('ko-KR', {month:'long', day:'numeric', weekday:'long'});

let state = { items: [] };
let editingId = null;
let undoStack = [];
let pendingDeleteId = null;

const ICON_EDIT = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>';
const ICON_SAVE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
const ICON_CANCEL = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

function setStatus(text, isErr){
  const el = $('status');
  el.textContent = text;
  el.className = 'status ' + (isErr ? 'err' : 'sync');
}

if(!firebaseConfig.apiKey || !firebaseConfig.projectId){
  $('config-banner').style.display = 'block';
  renderLocal();
} else {
  startFirebase();
}

function startFirebase(){
  let app, db, auth, docRef;
  try {
    app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    auth = getAuth(app);
    docRef = doc(db, "checklist", "main");
  } catch(e){
    setStatus('Firebase 초기화 실패: ' + e.message, true);
    renderLocal();
    return;
  }

  setStatus('연결 중…');

  signInAnonymously(auth).catch(e => {
    setStatus('로그인 실패: ' + e.message + ' (익명 인증을 켰는지 확인)', true);
  });

  onAuthStateChanged(auth, user => {
    if(!user) return;

    onSnapshot(docRef, async snap => {
      if(!snap.exists()){
        await setDoc(docRef, { items: DEFAULT_ITEMS });
        return;
      }
      const data = snap.data();
      state = { items: (data.items || []).map(i => ({ id: i.id, text: i.text })) };
      setStatus('동기화됨');
      if(!editingId) render();
    }, err => {
      setStatus('동기화 오류: ' + err.message, true);
    });
  });

  window.__save = async () => {
    try {
      await setDoc(docRef, { items: state.items });
    } catch(e){
      setStatus('저장 실패: ' + e.message, true);
    }
  };
}

function renderLocal(){
  state = { items: DEFAULT_ITEMS.map(i => ({...i})) };
  window.__save = async () => {};
  render();
}

function mutate(fn){
  undoStack.push(JSON.stringify(state.items));
  if(undoStack.length > 50) undoStack.shift();
  fn();
  window.__save();
  render();
}

function undo(){
  if(!undoStack.length) return;
  state.items = JSON.parse(undoStack.pop());
  editingId = null;
  window.__save();
  render();
}

function render(){
  const root = $('list');
  root.innerHTML = '';

  if(state.items.length === 0){
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = '항목이 없어. 아래에서 추가해봐.';
    root.appendChild(empty);
  }

  state.items.forEach(item => {
    const row = document.createElement('div');
    row.className = 'item';

    if(editingId === item.id){
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'edit-input';
      input.value = item.text;

      const commit = () => {
        const v = input.value.trim();
        if(v && v !== item.text){
          mutate(() => { item.text = v; editingId = null; });
        } else {
          editingId = null;
          render();
        }
      };
      const cancel = () => { editingId = null; render(); };

      input.onkeydown = e => {
        if(e.key === 'Enter') commit();
        if(e.key === 'Escape') cancel();
      };
      row.appendChild(input);

      const saveBtn = document.createElement('button');
      saveBtn.className = 'icon-btn save';
      saveBtn.innerHTML = ICON_SAVE;
      saveBtn.setAttribute('aria-label', '저장');
      saveBtn.onclick = commit;
      row.appendChild(saveBtn);

      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'icon-btn cancel';
      cancelBtn.innerHTML = ICON_CANCEL;
      cancelBtn.setAttribute('aria-label', '취소');
      cancelBtn.onclick = cancel;
      row.appendChild(cancelBtn);

      root.appendChild(row);
      setTimeout(() => { input.focus(); input.select(); }, 0);
    } else {
      const cb = document.createElement('div');
      cb.className = 'checkbox';
      cb.setAttribute('role', 'button');
      cb.setAttribute('aria-label', '완료 및 삭제');
      cb.onclick = () => openDeleteModal(item.id);
      row.appendChild(cb);

      const text = document.createElement('span');
      text.className = 'item-text';
      text.textContent = item.text;
      row.appendChild(text);

      const editBtn = document.createElement('button');
      editBtn.className = 'icon-btn edit';
      editBtn.innerHTML = ICON_EDIT;
      editBtn.setAttribute('aria-label', '수정');
      editBtn.onclick = () => { editingId = item.id; render(); };
      row.appendChild(editBtn);

      root.appendChild(row);
    }
  });

  $('undo-btn').disabled = undoStack.length === 0;
}

function openDeleteModal(id){
  const item = state.items.find(i => i.id === id);
  if(!item) return;
  pendingDeleteId = id;
  $('modal-item').textContent = '"' + item.text + '"';
  $('modal').classList.add('show');
}

function closeModal(){
  pendingDeleteId = null;
  $('modal').classList.remove('show');
}

$('modal-cancel').onclick = closeModal;
$('modal-confirm').onclick = () => {
  if(pendingDeleteId){
    const id = pendingDeleteId;
    mutate(() => { state.items = state.items.filter(i => i.id !== id); });
  }
  closeModal();
};
$('modal').onclick = e => { if(e.target === $('modal')) closeModal(); };

$('undo-btn').onclick = undo;

function addItem(){
  const inp = $('new-input');
  const v = inp.value.trim();
  if(!v) return;
  mutate(() => { state.items.push({ id: 'item_' + Date.now(), text: v }); });
  inp.value = '';
}
$('add-btn').onclick = addItem;
$('new-input').onkeydown = e => { if(e.key === 'Enter') addItem(); };
</script>
</body>
</html>
